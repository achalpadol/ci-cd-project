name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Project Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t ci-cd-demo .

      - name: Validate Docker Image
        run: docker images
